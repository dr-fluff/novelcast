<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title }} - {{ chapter }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="/static/scripts/main.js" defer></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="light">

<!-- PROGRESS BAR -->
<div id="progress-bar"></div>

<!-- READER UI (WRAPPED FOR TOGGLE) -->
<div class="reader-ui">

    <!-- HEADER -->
    <header class="reader-header">
        <div class="book-info">
            <h1><i class="fa-solid fa-book-open"></i> {{ title }}</h1>
            <p>{{ author }} • {{ chapter }}</p>
        </div>

        <div class="reading-progress-text" id="reading-progress-text">
            0% read
        </div>
    </header>

    <!-- FLOATING SIDE CONTROLS -->
    <div class="reader-controls">
        <button onclick="changeFont(-1)">A-</button>
        <button onclick="changeFont(1)">A+</button>
        <button onclick="setTheme('light')">☀</button>
        <button onclick="setTheme('dark')">🌙</button>
        <button onclick="setTheme('sepia')">📖</button>
    </div>

</div>

<!-- READING CONTENT -->
<main class="chapter-content">

    <h2 class="chapter-title">
        <i class="fa-regular fa-bookmark"></i>
        {{ chapter }}
    </h2>
    <hr>

    {{ content | safe }}

</main>

<!-- FLOATING NAV -->
<nav class="chapter-nav desktop-nav">

    <a class="nav-button back" href="/story?url={{ url | urlencode }}">
        <i class="fa-solid fa-list"></i>
        Chapters
    </a>

    {% if prev_chapter %}
    <a class="nav-button prev" href="/chapter?url={{ url | urlencode }}&chapter={{ prev_chapter | urlencode }}">
        <i class="fa-solid fa-arrow-left"></i>
        Previous
    </a>
    {% endif %}

    {% if next_chapter %}
    <a class="nav-button next" href="/chapter?url={{ url | urlencode }}&chapter={{ next_chapter | urlencode }}">
        Next
        <i class="fa-solid fa-arrow-right"></i>
    </a>
    {% endif %}

</nav>

</body>
</html>
