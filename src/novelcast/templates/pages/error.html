<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="/static/styles.css" />
    </head>
    <body>
        <h1>Error</h1>
        <p>{{ error }}</p>
        {% if log %}
            <section>
                <h2>Recent log output</h2>
                <pre>{{ log | join("\n") }}</pre>
            </section>
        {% else %}
            <p>No log output is available.</p>
        {% endif %}
    </body>
</html>
