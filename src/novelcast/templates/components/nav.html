<header class="library-header">

    <!-- LEFT: BRAND -->
    <div class="library-title">
        <h1>📚 NovelCast</h1>
        <p>Your reading library</p>
    </div>

    <!-- CENTER: ACTIONS -->
    <div class="library-actions">

        <form action="/subscribe" method="post" class="inline-form">
            <input name="url" placeholder="Add novel URL" />
            <button type="submit">Add</button>
        </form>

        <form action="/update_all" method="post">
            <button type="submit">⟳</button>
        </form>

    </div>

    <!-- RIGHT: ICONS ONLY -->
    <div class="library-user">

        <!-- SETTINGS -->
        <a class="icon-button" href="/settings" title="Settings">
            ⚙️
        </a>

        <!-- USER -->
        <button class="icon-button" onclick="toggleUserMenu()" title="User">
            👤
        </button>

    </div>

</header>
