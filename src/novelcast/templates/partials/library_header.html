<header class="library-header">

    <!-- LEFT: BRAND -->
    <div class="library-title">
        <h1>📚 NovelCast</h1>
        <p>Your reading library</p>
    </div>

    <!-- CENTER: ACTIONS -->
    <div class="library-actions">

        <!-- ADD STORY (JS HANDLED) -->
        <form class="inline-form" onsubmit="addStory(event)">
            <input
                id="story-url"
                placeholder="Paste novel URL..."
                required
                autocomplete="off"
            />
            <button type="submit">➕ Add</button>
        </form>

        <!-- SYNC ALL -->
        <form action="/api/sync/all" method="post">
            <button type="submit" title="Sync all stories">
                ⟳ Sync
            </button>
        </form>

    </div>

    <!-- RIGHT: USER + SETTINGS -->
    <div class="library-user">

        <!-- SETTINGS -->
        <a class="icon-button" href="/settings" title="Settings">
            ⚙️
        </a>

        <!-- USER MENU -->
        <button class="icon-button" onclick="toggleUserMenu()" title="User menu">
            👤
        </button>

        <!-- STATUS INDICATOR -->
        <div class="status-dot" id="sync-status" title="Idle"></div>

    </div>

</header>

<!-- JS IMPORT -->
<script src="/static/js/library_header.js"></script>
