<header class="library-header">

    <!-- LEFT: BRAND -->
    <div class="library-title">
        <a href="/">
            <h1><i class="fa-solid fa-book"></i> NovelCast</h1>
        </a>
        <p>Your reading library</p>
    </div>

    <!-- CENTER: ACTIONS -->
    <div class="library-actions">

        <!-- ADD STORY -->
        <form class="inline-form" onsubmit="addStory(event)">
            <input
                id="story-url"
                placeholder="Paste novel URL..."
                required
                autocomplete="off"
            />
            <button type="submit">
                <i class="fa-solid fa-plus"></i> Add
            </button>
        </form>

        <!-- SYNC ALL -->
        <form action="/api/sync/all" method="post">
            <button type="submit" title="Sync all stories">
                <i class="fa-solid fa-rotate"></i>
            </button>
        </form>

    </div>

    <!-- RIGHT: USER + SETTINGS -->
    <div class="library-user">

        <!-- SETTINGS -->
        <a class="icon-button" href="/settings" title="Settings">
            <i class="fa-solid fa-gear"></i>
        </a>

        <!-- USER MENU -->
        <button class="icon-button" onclick="toggleUserMenu()" title="User menu">
            <i class="fa-solid fa-user"></i>
        </button>

        <!-- STATUS -->
        <div class="status-dot" id="sync-status" title="Idle"></div>

    </div>

</header>
